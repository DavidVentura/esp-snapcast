[build]
target = "xtensa-esp32-espidf"

[target.xtensa-esp32-espidf]
linker = "ldproxy"
# runner = "espflash --monitor" # Select this runner for espflash v1.x.x
runner = "espflash flash --monitor" # Select this runner for espflash v2.x.x
rustflags = [ "--cfg",  "espidf_time64"] # Extending time_t for ESP IDF 5: https://github.com/esp-rs/rust/issues/110

[unstable]
build-std = ["std", "panic_abort"]

[env]
MCU="esp32"
# Note: this variable is not used by the pio builder (`cargo build --features pio`)
ESP_IDF_VERSION = "v5.1.3"

# opus-embedded-sys cross-compilation: libopus is built via autotools+cc, which
# need the xtensa gcc (bare name: autotools derives configure --host from it, so
# `source ~/export-esp.sh` must provide PATH), and its bindgen needs esp-clang
# (host libclang has no xtensa support)
LIBCLANG_PATH = "/home/david/.rustup/toolchains/esp/xtensa-esp32-elf-clang/esp-19.1.2_20250225/esp-clang/lib"
CC_xtensa_esp32_espidf = "xtensa-esp32-elf-gcc"
AR_xtensa_esp32_espidf = "xtensa-esp32-elf-ar"
CFLAGS_xtensa_esp32_espidf = "-mlongcalls"

